<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxuryShop Backend</title>
    <style>
        body { background: #080808; color: #f3d27a; font-family: Arial, sans-serif; margin: 0; padding: 2rem; }
        a { color: #fff; text-decoration: none; }
        .card { background: #121212; border: 1px solid #3c3c3c; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        h1, h2 { margin-top: 0; }
        ul { list-style: none; padding-left: 0; }
        li { margin-bottom: 0.75rem; }
        .badge { color: #000; background: #f3d27a; border-radius: 999px; padding: 0.25rem 0.75rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>LuxuryShop Django Backend</h1>
        <p>Use the Django admin at <a href="/admin/">/admin/</a> to manage products, categories, customers, and orders.</p>
        <p>API endpoints:</p>
        <ul>
            <li><a href="/api/products/">/api/products/</a></li>
            <li><a href="/api/categories/">/api/categories/</a></li>
            <li><a href="/admin/dashboard/">/admin/dashboard/</a> (staff only)</li>
        </ul>
        <p class="badge">Login with a superuser account to access the admin dashboard</p>
    </div>
</body>
</html>
